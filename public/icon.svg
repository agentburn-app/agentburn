<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="core" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Outer flame / main shape -->
  <path d="M256 42c0 0-144 138-144 270c0 79.5 64.5 158 144 158s144-78.5 144-158C400 180 256 42 256 42z" fill="url(#flame)"/>
  <!-- Inner bright core — shaped like an upward spike/chart peak -->
  <path d="M256 220c0 0-68 72-68 128c0 42 28 76 68 76s68-34 68-76C324 292 256 220 256 220z" fill="url(#core)"/>
  <!-- Subtle bar-chart lines inside the core to hint at cost tracking -->
  <rect x="230" y="320" width="12" height="36" rx="3" fill="#4f46e5" opacity="0.5"/>
  <rect x="250" y="300" width="12" height="56" rx="3" fill="#4f46e5" opacity="0.6"/>
  <rect x="270" y="310" width="12" height="46" rx="3" fill="#4f46e5" opacity="0.5"/>
</svg>
